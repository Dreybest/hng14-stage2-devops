name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API lint dependencies
        run: pip install -r api/requirements-dev.txt
        working-directory: .

      - name: Run flake8
        run: flake8 api
        working-directory: .

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Run ESLint
        run: npm run lint
        working-directory: frontend

      - name: Install hadolint
        run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Run hadolint
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API test dependencies
        run: |
          pip install -r api/requirements.txt
          pip install -r api/requirements-dev.txt

      - name: Run pytest with coverage
        run: PYTHONPATH=. pytest --cov=api --cov-report=xml api/tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api

      - name: Build worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker

      - name: Build frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend

      - name: Push API image
        run: docker push localhost:5000/api:${{ github.sha }} && docker push localhost:5000/api:latest

      - name: Push worker image
        run: docker push localhost:5000/worker:${{ github.sha }} && docker push localhost:5000/worker:latest

      - name: Push frontend image
        run: docker push localhost:5000/frontend:${{ github.sha }} && docker push localhost:5000/frontend:latest
    
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        run: docker build -t localhost:5000/api:${{ github.sha }} ./api

      - name: Build worker image for scanning
        run: docker build -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Build frontend image for scanning
        run: docker build -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Push API image to local registry
        run: docker push localhost:5000/api:${{ github.sha }}

      - name: Push worker image to local registry
        run: docker push localhost:5000/worker:${{ github.sha }}

      - name: Push frontend image to local registry
        run: docker push localhost:5000/frontend:${{ github.sha }}

      - name: Run Trivy scan for API
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan for worker
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/worker:${{ github.sha }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Run Trivy scan for frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost:5000/frontend:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-reports
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test .env file
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${REDIS_PASSWORD}
          QUEUE_NAME=job
          PROCESSING_DELAY=2
          APP_ENV=production
          FRONTEND_PORT=3000
          API_URL=http://api:8000
          API_PORT=8000
          EOF

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not become ready in time"
          exit 1

      - name: Submit job and verify completion
        run: |
          JOB_ID=$(curl -fsS -X POST http://localhost:3000/submit | python -c "import sys, json; print(json.load(sys.stdin)['job_id'])")
          echo "Submitted job: $JOB_ID"

          for i in {1..30}; do
            STATUS=$(curl -fsS http://localhost:3000/status/$JOB_ID | python -c "import sys, json; print(json.load(sys.stdin)['status'])")
            echo "Current status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done

          echo "Job did not complete in time"
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deploy .env file
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          cat <<EOF > .env
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${REDIS_PASSWORD}
          QUEUE_NAME=job
          PROCESSING_DELAY=2
          APP_ENV=production
          FRONTEND_PORT=3000
          API_URL=http://api:8000
          API_PORT=8000
          EOF

      - name: Start current stack
        run: docker compose up -d --build

      - name: Build new API image
        run: docker build -t hng14-api-candidate:${{ github.sha }} ./api

      - name: Start candidate API container
        run: |
          docker rm -f api-candidate || true
          docker run -d \
            --name api-candidate \
            --network hng14-stage2-devops_internal \
            --env-file .env \
            -p 8001:8000 \
            hng14-api-candidate:${{ github.sha }}

      - name: Wait for candidate API health check
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8001/health; then
              echo "Candidate API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Candidate API failed health check within 60 seconds"
          exit 1

      - name: Replace old API only after candidate is healthy
        run: |
          docker compose stop api
          docker compose rm -f api
          docker compose up -d --no-deps api

      - name: Wait for replaced API to become healthy
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/health; then
              echo "Replaced API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Replaced API failed health check within 60 seconds"
          exit 1

      - name: Confirm stack is running
        run: docker compose ps

      - name: Confirm deployed API is healthy
        run: curl -fsS http://localhost:8000/health

      - name: Confirm frontend is still healthy
        run: curl -fsS http://localhost:3000/health

      - name: Remove candidate container
        if: always()
        run: docker rm -f api-candidate || true

      - name: Show deploy logs on failure
        if: failure()
        run: |
          docker compose logs
          docker logs api-candidate || true
