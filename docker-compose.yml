services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    env_file:
      - .env
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "0.50"
    mem_limit: 256m

  api:
    build:
      context: ./api
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "${API_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "0.50"
    mem_limit: 256m

  worker:
    build:
      context: ./worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "python", "-c", "import os, redis; r = redis.Redis(host=os.getenv('REDIS_HOST', 'redis'), port=int(os.getenv('REDIS_PORT', 6379)), password=os.getenv('REDIS_PASSWORD') or None); r.ping()"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "0.50"
    mem_limit: 256m

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "${FRONTEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(res => { if (!res.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    cpus: "0.50"
    mem_limit: 256m

networks:
  internal:
    driver: bridge